name: deploy-static-web-app
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    # Phase A CI guard (D-9 / G-A9 / TR-8) — main 推送默认 SKIP 生产部署。
    # 进入生产 SWA 必须满足下列任一条件：
    #   1) 仓库 vars.PHASE == 'B'（手动设置，phaseB cutover 启用）
    #   2) commit message 含 [hotfix]（紧急回滚 / 热修）
    # 详见 architecture.md §6.5 + sprint-contract §1.1 G。
    if: |
      vars.PHASE == 'B' ||
      contains(github.event.head_commit.message, '[hotfix]')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:data && pnpm lint && pnpm typecheck && pnpm test && pnpm build
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "out"
          output_location: ""
          skip_app_build: true
          skip_api_build: true
